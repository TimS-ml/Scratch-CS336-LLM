# ============================================================================
# Quality vs Speed Trade-offs / 质量与速度权衡
# ============================================================================

# Maximum Quality Configuration / 最高质量配置
# bits: 8
# group_size: 32
# damp_percent: 0.01
# desc_act: true
# max_samples: null  # Use all calibration data

# Balanced Configuration / 平衡配置
# bits: 4
# group_size: 128
# damp_percent: 0.1
# desc_act: false
# max_samples: 256

# Maximum Speed Configuration / 最高速度配置
# bits: 4
# group_size: -1  # No grouping
# damp_percent: 0.1
# desc_act: false
# max_samples: 128

# ============================================================================
# Usage Examples / 使用示例
# ============================================================================

# 1. Basic usage with this config file / 使用此配置文件的基本用法:
#    python scripts/quantize_model.py --config scripts/configs/quantization.yaml

# 2. Override specific parameters / 覆盖特定参数:
#    python scripts/quantize_model.py --config scripts/configs/quantization.yaml --bits 8

# 3. Command line only (no config file) / 仅命令行（无配置文件）:
#    python scripts/quantize_model.py \
#      --model_path Qwen/Qwen2.5-0.5B \
#      --data_path data/calibration.jsonl \
#      --output_dir output/quantized_model \
#      --bits 4 \
#      --group_size 128

# ============================================================================
# Calibration Data Format / 校准数据格式
# ============================================================================

# The calibration data should be in JSONL format (one JSON object per line):
# 校准数据应为 JSONL 格式（每行一个 JSON 对象）：
#
# {"input": "What is the capital of France?", "target": "The capital of France is Paris."}
# {"input": "Explain quantum computing.", "target": "Quantum computing uses quantum mechanics..."}
# {"input": "Write a poem about AI.", "target": "In silicon dreams and neural streams..."}
#
# Each line should contain:
# 每行应包含：
# - "input": The user's question or prompt / 用户的问题或提示
# - "target": The expected response (optional) / 预期的响应（可选）

# ============================================================================
# Performance Tips / 性能提示
# ============================================================================

# 1. GPU Memory / GPU 内存:
#    - Monitor GPU memory usage with: nvidia-smi
#    - If OOM, reduce: max_memory_per_gpu, batch_size, max_input_length
#    - 使用 nvidia-smi 监控 GPU 内存
#    - 如果内存不足，减少：max_memory_per_gpu、batch_size、max_input_length

# 2. Calibration Samples / 校准样本:
#    - More samples: Better quality, slower quantization
#    - 128-256 samples usually sufficient for good quality
#    - 更多样本：更好质量，更慢量化
#    - 128-256 个样本通常足以获得良好质量

# 3. Multi-GPU / 多 GPU:
#    - Set num_gpus to use multiple GPUs
#    - Adjust max_memory_per_gpu based on total GPU memory
#    - 设置 num_gpus 以使用多个 GPU
#    - 根据总 GPU 内存调整 max_memory_per_gpu

# 4. Triton / Triton:
#    - Enable use_triton for faster quantization (if available)
#    - Install with: pip install triton
#    - 启用 use_triton 以加快量化（如果可用）
#    - 安装：pip install triton

# ============================================================================
# Troubleshooting / 故障排除
# ============================================================================

# Issue: Out of Memory (OOM) / 问题：内存不足（OOM）
# Solution: Reduce max_memory_per_gpu, batch_size, or max_input_length
# 解决方案：减少 max_memory_per_gpu、batch_size 或 max_input_length

# Issue: Quantization too slow / 问题：量化太慢
# Solution: Enable cache_examples_on_gpu, use_triton, or reduce max_samples
# 解决方案：启用 cache_examples_on_gpu、use_triton 或减少 max_samples

# Issue: Poor model quality after quantization / 问题：量化后模型质量差
# Solution: Use 8-bit, smaller group_size, more calibration samples
# 解决方案：使用 8 位、更小的 group_size、更多校准样本

# Issue: Model not loading / 问题：模型加载失败
# Solution: Check model_path, ensure trust_remote_code is true
# 解决方案：检查 model_path，确保 trust_remote_code 为 true
