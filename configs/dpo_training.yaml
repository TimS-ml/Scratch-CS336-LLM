# DPO Training Configuration
# DPO 训练配置
#
# This configuration file contains all parameters for DPO (Direct Preference Optimization) training.
# You can override any parameter via command-line arguments.
# 此配置文件包含 DPO（直接偏好优化）训练的所有参数。
# 您可以通过命令行参数覆盖任何参数。
#
# Usage / 用法:
#   python scripts/train_dpo.py --config configs/dpo_training.yaml
#
# Author: wdndev
# Date: 2025-11-14

# ============================================================================
# Model Configuration / 模型配置
# ============================================================================
model:
  # Path to pretrained model or model identifier from huggingface.co/models
  # 预训练模型路径或来自 huggingface.co/models 的模型标识符
  model_name_or_path: "Qwen/Qwen2.5-0.5B"

  # Path to base model (if using LoRA, this is the original model)
  # Optional - if not set, will use model_name_or_path
  # 基础模型路径（如果使用 LoRA，这是原始模型）
  # 可选 - 如果未设置，将使用 model_name_or_path
  base_model_path: null

  # Pretrained tokenizer name or path (if different from model)
  # 预训练分词器名称或路径（如果与模型不同）
  tokenizer_name_or_path: null

  # Whether to trust remote code when loading models
  # 加载模型时是否信任远程代码
  trust_remote_code: true

  # Whether to use model cache (should be False for training)
  # 是否使用模型缓存（训练时应为 False）
  use_cache: false

  # Model dtype: "auto", "float16", "bfloat16", or "float32"
  # 模型数据类型: "auto"、"float16"、"bfloat16" 或 "float32"
  torch_dtype: "auto"

  # Device map for model parallelism: "auto", "balanced", or null
  # 模型并行的设备映射: "auto"、"balanced" 或 null
  device_map: null


# ============================================================================
# Data Configuration / 数据配置
# ============================================================================
data:
  # Path to training dataset (JSONL format with prompt/chosen/rejected)
  # 训练数据集路径（JSONL 格式，包含 prompt/chosen/rejected）
  train_dataset_path: "data/dpo_train/train.jsonl"

  # Path to evaluation dataset (optional)
  # 评估数据集路径（可选）
  eval_dataset_path: "data/dpo_train/eval.jsonl"

  # Maximum total sequence length (prompt + response)
  # 最大总序列长度（提示 + 回答）
  max_length: 1024

  # Maximum length of the prompt
  # 提示的最大长度
  max_prompt_length: 512

  # If True, only use 1000 samples for quick testing
  # 如果为 True，仅使用 1000 个样本进行快速测试
  sanity_check: false

  # Number of processes for parallel data preprocessing
  # 并行数据预处理的进程数
  num_proc: 8

  # System prompt for conversations
  # 对话的系统提示
  system_prompt: "你是由wdndev开发的个人助手。"


# ============================================================================
# Training Configuration / 训练配置
# ============================================================================
training:
  # Output directory for model checkpoints and logs
  # 模型检查点和日志的输出目录
  output_dir: "./outputs/dpo_training"

  # Number of training epochs
  # 训练轮数
  num_train_epochs: 3

  # Batch size per device for training
  # 训练时每个设备的批次大小
  per_device_train_batch_size: 2

  # Batch size per device for evaluation
  # 评估时每个设备的批次大小
  per_device_eval_batch_size: 2

  # Number of gradient accumulation steps
  # 梯度累积步数
  gradient_accumulation_steps: 8

  # Learning rate
  # 学习率
  learning_rate: 5.0e-5

  # Learning rate scheduler type
  # Options: "linear", "cosine", "cosine_with_restarts", "polynomial", "constant"
  # 学习率调度器类型
  # 选项: "linear"、"cosine"、"cosine_with_restarts"、"polynomial"、"constant"
  lr_scheduler_type: "cosine"

  # Warmup ratio (fraction of total steps)
  # 预热比例（总步数的比例）
  warmup_ratio: 0.1

  # Weight decay for regularization
  # 正则化的权重衰减
  weight_decay: 0.01

  # Optimizer type
  # Options: "adamw_torch", "adamw_hf", "sgd", "adafactor", etc.
  # 优化器类型
  # 选项: "adamw_torch"、"adamw_hf"、"sgd"、"adafactor" 等
  optim: "adamw_torch"

  # Maximum gradient norm for clipping
  # 梯度裁剪的最大梯度范数
  max_grad_norm: 1.0

  # Whether to use gradient checkpointing (saves memory)
  # 是否使用梯度检查点（节省内存）
  gradient_checkpointing: true

  # Use reentrant for gradient checkpointing
  # 梯度检查点使用可重入模式
  gradient_checkpointing_kwargs:
    use_reentrant: false

  # Mixed precision training
  # 混合精度训练
  # Use bf16 if your GPU supports it (A100, RTX 30xx+, etc.)
  # 如果您的 GPU 支持（A100、RTX 30xx+ 等），请使用 bf16
  bf16: false
  fp16: true

  # Logging configuration / 日志配置
  logging_dir: "./outputs/dpo_training/logs"
  logging_strategy: "steps"
  logging_steps: 10
  logging_first_step: true

  # Evaluation configuration / 评估配置
  evaluation_strategy: "steps"
  eval_steps: 100

  # Checkpoint saving configuration / 检查点保存配置
  save_strategy: "steps"
  save_steps: 100
  save_total_limit: 3  # Keep only the last 3 checkpoints
                       # 仅保留最后 3 个检查点

  # Load best model at end
  # 训练结束时加载最佳模型
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false

  # Other training settings / 其他训练设置
  report_to: "tensorboard"  # Options: "tensorboard", "wandb", "none"
                            # 选项: "tensorboard"、"wandb"、"none"
  remove_unused_columns: false
  dataloader_num_workers: 4
  dataloader_pin_memory: true

  # Random seed for reproducibility
  # 可重现性的随机种子
  seed: 42

  # DeepSpeed configuration (optional)
  # DeepSpeed 配置（可选）
  # Path to DeepSpeed JSON config file for distributed training
  # DeepSpeed JSON 配置文件路径，用于分布式训练
  #
  # For multi-GPU training with models up to ~7B parameters:
  # 对于最多约 7B 参数的多 GPU 训练：
  # deepspeed: "configs/deepspeed/zero2.json"
  #
  # For very large models (7B+) or limited GPU memory:
  # 对于非常大的模型（7B+）或 GPU 内存有限的情况：
  # deepspeed: "configs/deepspeed/zero3.json"
  #
  # See configs/deepspeed/README.md for detailed documentation
  # 请参阅 configs/deepspeed/README.md 以获取详细文档
  deepspeed: null

  # Note: When using DeepSpeed, ensure fp16 or bf16 is enabled above
  # 注意：使用 DeepSpeed 时，请确保上面启用了 fp16 或 bf16


# ============================================================================
# DPO-Specific Configuration / DPO 特定配置
# ============================================================================
dpo:
  # Beta parameter for DPO loss (controls strength of KL penalty)
  # Typical values: 0.1 - 0.5
  # DPO 损失的 beta 参数（控制 KL 惩罚的强度）
  # 典型值: 0.1 - 0.5
  beta: 0.1

  # Type of DPO loss
  # Options: "sigmoid", "hinge", "ipo", "kto_pair"
  # DPO 损失类型
  # 选项: "sigmoid"、"hinge"、"ipo"、"kto_pair"
  loss_type: "sigmoid"

  # Label smoothing factor (0.0 = no smoothing)
  # 标签平滑因子（0.0 = 无平滑）
  label_smoothing: 0.0

  # Whether to generate samples during evaluation
  # Note: This can be slow, set to false for faster evaluation
  # 是否在评估期间生成样本
  # 注意: 这可能很慢，设置为 false 可加快评估速度
  generate_during_eval: false


# ============================================================================
# LoRA Configuration / LoRA 配置
# ============================================================================
lora:
  # Whether to use LoRA for parameter-efficient fine-tuning
  # 是否使用 LoRA 进行参数高效微调
  use_lora: false

  # LoRA rank (dimension of the low-rank matrices)
  # Typical values: 8, 16, 32, 64
  # Higher = more capacity but more parameters
  # LoRA 秩（低秩矩阵的维度）
  # 典型值: 8、16、32、64
  # 更高 = 更大容量但更多参数
  lora_r: 8

  # LoRA alpha (scaling factor)
  # Typically set to 2 * lora_r
  # LoRA alpha（缩放因子）
  # 通常设置为 2 * lora_r
  lora_alpha: 16

  # LoRA dropout probability
  # LoRA dropout 概率
  lora_dropout: 0.05

  # Target modules for LoRA
  # Set to null to use default modules based on model architecture
  # Common choices for LLaMA/Qwen: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  # LoRA 的目标模块
  # 设置为 null 以使用基于模型架构的默认模块
  # LLaMA/Qwen 的常见选择: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  lora_target_modules: null

  # Bias type for LoRA
  # Options: "none", "all", "lora_only"
  # LoRA 的偏置类型
  # 选项: "none"、"all"、"lora_only"
  lora_bias: "none"


# ============================================================================
# Example Configurations for Different Scenarios
# 不同场景的配置示例
# ============================================================================

# Scenario 1: Quick test run / 场景 1: 快速测试运行
# ----------------------------------------
# Uncomment and modify the following settings:
# 取消注释并修改以下设置:
#
# data:
#   sanity_check: true
# training:
#   num_train_epochs: 1
#   save_steps: 50
#   eval_steps: 50


# Scenario 2: Full training with LoRA / 场景 2: 使用 LoRA 的完整训练
# ----------------------------------------
# Uncomment and modify the following settings:
# 取消注释并修改以下设置:
#
# lora:
#   use_lora: true
#   lora_r: 16
#   lora_alpha: 32
# training:
#   num_train_epochs: 5
#   per_device_train_batch_size: 4
#   gradient_accumulation_steps: 4


# Scenario 3: Large model with memory optimization / 场景 3: 大模型内存优化
# ----------------------------------------
# Uncomment and modify the following settings:
# 取消注释并修改以下设置:
#
# training:
#   per_device_train_batch_size: 1
#   gradient_accumulation_steps: 32
#   gradient_checkpointing: true
#   bf16: true  # If supported
# model:
#   device_map: "auto"
# lora:
#   use_lora: true


# Scenario 4: Multi-GPU training / 场景 4: 多 GPU 训练
# ----------------------------------------
# Run with: torchrun --nproc_per_node=NUM_GPUS scripts/train_dpo.py --config ...
# 运行命令: torchrun --nproc_per_node=GPU数量 scripts/train_dpo.py --config ...
#
# Adjust batch size and accumulation steps accordingly
# 相应调整批次大小和累积步数
